<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Koch Snowflake with Randomness</title>
  <link rel="stylesheet" href="../../shared/book.css" />
  <link rel="stylesheet" href="./style.css" />
  <script type="module" src="https://pyscript.net/releases/2025.2.3/core.js"></script>
</head>
<body>
  <main>
    <h1>Koch Snowflake with Randomness</h1>

    <section class="controls">
      <label>
        Iterations
        <input id="iterations" type="range" min="0" max="6" value="3" />
      </label>

      <label>
        Randomness
        <input id="randomness" type="range" min="0" max="100" value="15" />
      </label>

      <label>
        Seed
        <input id="seed" type="number" value="42" />
      </label>

      <button py-click="redraw">Redraw</button>
    </section>

    <section class="figure">
      <svg id="plot" width="800" height="800" viewBox="0 0 800 800"></svg>
    </section>

    <script type="py" src="./app.py"></script>
  </main>
</body>
</html>
